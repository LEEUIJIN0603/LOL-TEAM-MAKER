<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>LOL 내전 팀 배정기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Rajdhani:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050910;
      --panel: #0d1520;
      --panel2: #111e2e;
      --border: #1c2e45;
      --gold: #c89b3c;
      --gold2: #f0d070;
      --gold-dim: rgba(200,155,60,0.12);
      --blue-team: #4a9eff;
      --red-team: #e84040;
      --text: #cdd0d8;
      --text-bright: #eef0f5;
      --muted: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ── HERO ── */
    .hero {
      position: relative; width: 100%; height: 240px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .hero-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center 22%;
      filter: brightness(0.62) saturate(1.1);
      transition: opacity 0.6s;
    }
    /* 좌우 그라데이션 + 하단 페이드 */
    .hero-overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(5,9,16,0) 40%, var(--bg) 100%),
        linear-gradient(to right, rgba(5,9,16,0.55) 0%, transparent 30%, transparent 70%, rgba(5,9,16,0.55) 100%);
    }
    /* 하단 경계선 광채 */
    .hero-shine {
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, transparent 0%, var(--gold) 30%, var(--gold2) 50%, var(--gold) 70%, transparent 100%);
      opacity: 0.7;
    }
    .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 20px; }
    .hero-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 3.8rem;
      letter-spacing: 10px;
      line-height: 1;
      margin-bottom: 10px;
      color: var(--gold2);
      text-shadow:
        0 0 30px rgba(200,155,60,0.9),
        0 0 80px rgba(200,155,60,0.4),
        0 3px 12px rgba(0,0,0,1);
    }
    .hero-sub {
      font-size: 0.8rem; letter-spacing: 5px;
      text-transform: uppercase; color: var(--gold);
      opacity: 0.85;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* PAGE */
    .page { max-width: 920px; margin: 0 auto; padding: 28px 20px 60px; }

    /* TABS */
    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
    .tab-btn { padding: 14px 10px; background: var(--panel); border: none; border-right: 1px solid var(--border); color: var(--muted); font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .tab-btn:last-child { border-right: none; }
    .tab-btn .t-main { font-size: 0.88rem; font-weight: 700; }
    .tab-btn .t-sub  { font-size: 0.68rem; opacity: 0.55; }
    .tab-btn.active { background: var(--gold-dim); color: var(--gold2); border-bottom: 2px solid var(--gold); }
    .tab-btn:hover:not(.active) { background: var(--panel2); color: var(--text); }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    /* CARD */
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 26px; margin-bottom: 18px; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    /* INPUTS */
    .rand-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
    .inp-wrap { display: flex; flex-direction: column; gap: 5px; }
    .inp-label { font-size: 0.68rem; font-weight: 500; color: var(--muted); text-align: center; }
    input[type=text] { background: #06101a; border: 1px solid var(--border); border-radius: 7px; color: var(--text-bright); font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; padding: 9px 6px; text-align: center; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; }
    input[type=text]:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,155,60,0.1); }
    input::placeholder { color: #1e3045; }
    input[type=number] { background: #06101a; border: 1px solid var(--border); border-radius: 7px; color: var(--gold2); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; padding: 9px 4px; text-align: center; width: 100%; transition: border-color 0.2s; -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number]:focus { outline: none; border-color: var(--gold); }

    /* POSITION GRID */
    .pos-col-labels { display: grid; grid-template-columns: 96px 1fr 1fr; gap: 10px; margin-bottom: 6px; }
    .pos-col-labels span { font-size: 0.68rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; }
    .pos-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .pos-row { display: grid; grid-template-columns: 96px 1fr 1fr; gap: 10px; align-items: center; }
    .pos-badge { display: flex; align-items: center; justify-content: center; gap: 5px; background: #06101a; border: 1px solid var(--border); border-radius: 8px; padding: 9px 6px; }
    .pos-icon { width: 20px; height: 20px; object-fit: contain; filter: brightness(1.3) saturate(0.8); }
    .pos-emoji { font-size: 14px; line-height: 1; }
    .pos-name { font-family: 'Bebas Neue', sans-serif; font-size: 0.88rem; letter-spacing: 2px; color: var(--gold); }

    /* ABILITY GRID — 2열 레이아웃: 왼쪽 라벨+힌트, 오른쪽 입력칸들 */
    .ability-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    .ability-wrap {
      display: grid;
      grid-template-columns: 130px 1fr 72px;
      gap: 8px;
      align-items: center;
    }
    .ability-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ability-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 52px;
    }
    .ability-hint {
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.55;
      white-space: nowrap;
    }

    /* BUTTON */
    .btn-main { width: 100%; padding: 15px; background: linear-gradient(135deg, #c89b3c, #7a5518); border: none; border-radius: 9px; color: #04080e; font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 5px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 18px rgba(200,155,60,0.22); }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,155,60,0.38); }
    .btn-main:active { transform: translateY(0); }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg { color: #fc8181; font-size: 0.8rem; text-align: center; margin-top: 10px; min-height: 16px; }

    /* CARD FLIP ANIMATION */
    .flip-wrap { display: none; margin-bottom: 18px; }
    .flip-wrap.active { display: block; animation: fadeUp 0.3s ease; }
    .flip-header { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 4px; color: var(--gold); text-align: center; margin-bottom: 20px; }
    .flip-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
    .flip-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .flip-role-lbl { display: flex; align-items: center; gap: 5px; }
    .flip-role-icon { width: 18px; height: 18px; object-fit: contain; opacity: 0.6; }
    .flip-role-emoji { font-size: 13px; line-height: 1; }
    .flip-role-name { font-family: 'Bebas Neue', sans-serif; font-size: 0.7rem; letter-spacing: 1px; color: var(--muted); }
    .flip-card-scene { width: 100%; height: 62px; perspective: 500px; }
    .flip-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
    .flip-card-front { background: #06101a; border: 1px solid var(--border); }
    .flip-card-front-icon { font-size: 1.4rem; opacity: 0.25; }
    .flip-card-back { background: var(--panel2); border: 1px solid var(--gold); transform: rotateY(180deg); padding: 4px; }
    .flip-card-back .fc-name { font-size: 0.8rem; font-weight: 700; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%; }
    .flip-card-back.blue-card { border-color: var(--blue-team); background: rgba(74,158,255,0.08); }
    .flip-card-back.red-card  { border-color: var(--red-team);  background: rgba(232,64,64,0.08); }
    .flip-card-back.blue-card .fc-name { color: var(--blue-team); }
    .flip-card-back.red-card  .fc-name { color: var(--red-team); }
    .flip-card-back .fc-team { font-family: 'Bebas Neue', sans-serif; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }
    .flip-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .flip-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .flip-progress-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.15s linear; }
    .flip-progress-text { font-family: 'Bebas Neue', sans-serif; font-size: 0.75rem; letter-spacing: 1px; color: var(--muted); min-width: 36px; text-align: right; }
    .flip-vs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
    .flip-team-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 3px; padding: 7px; border-radius: 6px; text-align: center; }
    .flip-team-lbl.blue { color: var(--blue-team); background: rgba(74,158,255,0.08); border: 1px solid rgba(74,158,255,0.2); }
    .flip-team-lbl.red  { color: var(--red-team);  background: rgba(232,64,64,0.08);  border: 1px solid rgba(232,64,64,0.2); }
    .flip-vs-dot { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); letter-spacing: 2px; }

    /* RESULT */
    .result-wrap { display: none; animation: fadeUp 0.45s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .teams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 12px; }
    .team-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .team-head { padding: 13px 18px; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 5px; display: flex; align-items: center; justify-content: space-between; }
    .team-head-left { display: flex; align-items: center; gap: 9px; }
    .blue .team-head { background: rgba(74,158,255,0.09); border-bottom: 1px solid rgba(74,158,255,0.22); color: var(--blue-team); }
    .red  .team-head { background: rgba(232,64,64,0.09);  border-bottom: 1px solid rgba(232,64,64,0.22);  color: var(--red-team); }
    .tdot { width: 8px; height: 8px; border-radius: 50%; }
    .blue .tdot { background: var(--blue-team); box-shadow: 0 0 8px var(--blue-team); }
    .red  .tdot { background: var(--red-team);  box-shadow: 0 0 8px var(--red-team); }
    .team-avg { font-size: 0.72rem; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; opacity: 0.75; letter-spacing: 0; }
    .role-list { padding: 8px 12px; }
    .role-row { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 7px; transition: background 0.15s; animation: slideIn 0.35s ease both; }
    .role-row:hover { background: rgba(255,255,255,0.04); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    .role-tag { display: flex; align-items: center; gap: 5px; min-width: 80px; }
    .ri { width: 18px; height: 18px; object-fit: contain; }
    .role-emoji-sm { font-size: 13px; line-height: 1; }
    .rn { font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem; letter-spacing: 1.5px; }
    .blue .rn { color: var(--blue-team); }
    .red  .rn { color: var(--red-team); }
    .pname { font-size: 0.92rem; font-weight: 500; color: var(--text-bright); flex: 1; }
    .pscore { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; color: var(--gold); min-width: 24px; text-align: right; }
    .score-bar-wrap { width: 48px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 2px; background: var(--gold); }
    .div { height: 1px; background: var(--border); margin: 2px 6px; }
    .btn-reroll { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 9px; color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
    .btn-reroll:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    @media (max-width: 620px) {
      .hero { height: 200px; }
      .hero-title { font-size: 2.4rem; letter-spacing: 6px; }
      .rand-grid, .ability-grid { grid-template-columns: repeat(2, 1fr); }
      .ability-wrap:nth-child(n+6) { margin-top: 0; }
      .flip-grid { grid-template-columns: repeat(5, 1fr); }
      .teams-row { grid-template-columns: 1fr; }
      .pos-row, .pos-col-labels { grid-template-columns: 80px 1fr 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .tab-btn { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div class="hero">
  <img class="hero-img" id="heroBg" src="" alt="">
  <div class="hero-overlay"></div>
  <div class="hero-shine"></div>
  <div class="hero-content">
    <div class="hero-title">LOL 내전 팀 배정기</div>
    <div class="hero-sub">League of Legends · 10인 · 2팀 랜덤</div>
  </div>
</div>

<div class="page">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pos',this)">
      <span class="t-main">🎯 포지션 고정</span>
      <span class="t-sub">포지션 지정 후 팀만 랜덤</span>
    </button>
    <button class="tab-btn" onclick="switchTab('random',this)">
      <span class="t-main">🎲 올 랜덤</span>
      <span class="t-sub">팀 + 포지션 모두 랜덤</span>
    </button>
    <button class="tab-btn" onclick="switchTab('ability',this)">
      <span class="t-main">⚖️ 올 랜덤 (능력치)</span>
      <span class="t-sub">평균 능력치 균형 배정</span>
    </button>
  </div>

  <!-- 포지션 고정 -->
  <div class="panel active" id="panel-pos">
    <div class="card">
      <div class="card-title">▸ 포지션별 2명 입력</div>
      <div class="pos-col-labels"><span>포지션</span><span>후보 A</span><span>후보 B</span></div>
      <div class="pos-rows" id="posRows"></div>
      <button class="btn-main" id="btnPos" onclick="doPos()">⚔&nbsp; 팀 배정 시작</button>
      <div class="error-msg" id="errPos"></div>
    </div>
    <div class="flip-wrap" id="flipPos">
      <div class="flip-header">▸ 카드를 뽑는 중...</div>
      <div class="flip-grid" id="flipGridPos"></div>
      <div class="flip-progress-row"><div class="flip-progress-bar"><div class="flip-progress-fill" id="progPos"></div></div><div class="flip-progress-text" id="progTxtPos">0 / 10</div></div>
      <div class="flip-vs" style="margin-top:14px">
        <div class="flip-team-lbl blue">블루팀</div>
        <div class="flip-vs-dot">VS</div>
        <div class="flip-team-lbl red">레드팀</div>
      </div>
    </div>
    <div class="result-wrap" id="resPos"></div>
  </div>

  <!-- 올 랜덤 -->
  <div class="panel" id="panel-random">
    <div class="card">
      <div class="card-title">▸ 참가자 10명 입력</div>
      <div class="rand-grid" id="randGrid"></div>
      <button class="btn-main" id="btnRand" onclick="doRandom()">⚔&nbsp; 팀 배정 시작</button>
      <div class="error-msg" id="errRand"></div>
    </div>
    <div class="flip-wrap" id="flipRand">
      <div class="flip-header">▸ 카드를 뽑는 중...</div>
      <div class="flip-grid" id="flipGridRand"></div>
      <div class="flip-progress-row"><div class="flip-progress-bar"><div class="flip-progress-fill" id="progRand"></div></div><div class="flip-progress-text" id="progTxtRand">0 / 10</div></div>
      <div class="flip-vs" style="margin-top:14px">
        <div class="flip-team-lbl blue">블루팀</div>
        <div class="flip-vs-dot">VS</div>
        <div class="flip-team-lbl red">레드팀</div>
      </div>
    </div>
    <div class="result-wrap" id="resRand"></div>
  </div>

  <!-- 올 랜덤 (능력치) -->
  <div class="panel" id="panel-ability">
    <div class="card">
      <div class="card-title">▸ 참가자 이름 + 능력치 입력 (1~10)</div>
      <div class="ability-grid" id="abilityGrid"></div>
      <button class="btn-main" id="btnAbility" onclick="doAbility()">⚔&nbsp; 팀 배정 시작</button>
      <div class="error-msg" id="errAbility"></div>
    </div>
    <div class="flip-wrap" id="flipAbility">
      <div class="flip-header">▸ 카드를 뽑는 중...</div>
      <div class="flip-grid" id="flipGridAbility"></div>
      <div class="flip-progress-row"><div class="flip-progress-bar"><div class="flip-progress-fill" id="progAbility"></div></div><div class="flip-progress-text" id="progTxtAbility">0 / 10</div></div>
      <div class="flip-vs" style="margin-top:14px">
        <div class="flip-team-lbl blue">블루팀</div>
        <div class="flip-vs-dot">VS</div>
        <div class="flip-team-lbl red">레드팀</div>
      </div>
    </div>
    <div class="result-wrap" id="resAbility"></div>
  </div>
</div>

<script>
const ROLES = ['TOP','JGL','MID','BOT','SPT'];

// 포지션별 이모지
const ROLE_EMOJI = { TOP: '🗡️', JGL: '🌿', MID: '⚡', BOT: '🏹', SPT: '🛡️' };

const ICONS = {
  TOP: 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/icon-position-top.png',
  JGL: 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/icon-position-jungle.png',
  MID: 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/icon-position-middle.png',
  BOT: 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/icon-position-bottom.png',
  SPT: 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-shared-components/global/default/icon-position-utility.png',
};

const SPLASHES = ['Jinx_0','Ahri_0','Lux_0','Zed_0','Yasuo_0','Ezreal_0','Vi_0','MissFortune_0','Thresh_0','LeeSin_0'];
document.getElementById('heroBg').src =
  'https://ddragon.leagueoflegends.com/cdn/img/champion/splash/' +
  SPLASHES[Math.floor(Math.random()*SPLASHES.length)] + '.jpg';

// 올 랜덤 입력칸
const rg = document.getElementById('randGrid');
for (let i = 0; i < 10; i++) {
  const d = document.createElement('div');
  d.className = 'inp-wrap';
  d.innerHTML = `<div class="inp-label">참가자 ${i+1}</div><input type="text" placeholder="이름" maxlength="12">`;
  rg.appendChild(d);
}

// 포지션 고정 입력칸
const pr = document.getElementById('posRows');
ROLES.forEach(role => {
  const row = document.createElement('div');
  row.className = 'pos-row';
  row.innerHTML = `
    <div class="pos-badge">
      <img class="pos-icon" src="${ICONS[role]}" alt="${role}" onerror="this.style.display='none'">
      <span class="pos-emoji">${ROLE_EMOJI[role]}</span>
      <span class="pos-name">${role}</span>
    </div>
    <input type="text" placeholder="이름" maxlength="12" data-role="${role}" data-slot="0">
    <input type="text" placeholder="이름" maxlength="12" data-role="${role}" data-slot="1">
  `;
  pr.appendChild(row);
});

// 능력치 입력칸 — 한 줄: [참가자 N  능력치 1~10] [이름 입력] [숫자]
const ag = document.getElementById('abilityGrid');
for (let i = 0; i < 10; i++) {
  const d = document.createElement('div');
  d.className = 'ability-wrap';
  d.innerHTML = `
    <div class="ability-meta">
      <span class="ability-num">참가자 ${i+1}</span>
      <span class="ability-hint">능력치 1~10</span>
    </div>
    <input type="text" placeholder="이름" maxlength="12" class="ab-name">
    <input type="number" placeholder="5" min="1" max="10" class="ab-score" value="">
  `;
  ag.appendChild(d);
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function balancedSplit(players) {
  let best = null, bestDiff = Infinity;
  const indices = players.map((_,i) => i);
  for (let t = 0; t < 200; t++) {
    const s = shuffle(indices);
    const g1 = s.slice(0,5), g2 = s.slice(5);
    const avg1 = g1.reduce((s,i) => s+players[i].score,0)/5;
    const avg2 = g2.reduce((s,i) => s+players[i].score,0)/5;
    const diff = Math.abs(avg1-avg2);
    if (diff < bestDiff) { bestDiff = diff; best = {g1,g2,avg1,avg2}; }
    if (diff < 0.01) break;
  }
  return best;
}

function runFlipAnimation(gridId, progId, progTxtId, members, onDone) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  const TOTAL_MS = 5000;
  const CARD_COUNT = members.length;
  const INTERVAL = (TOTAL_MS - 800) / CARD_COUNT;
  const cardEls = [];

  for (let ci = 0; ci < 5; ci++) {
    const col = document.createElement('div');
    col.className = 'flip-col';
    const lbl = document.createElement('div');
    lbl.className = 'flip-role-lbl';
    lbl.innerHTML = `
      <img class="flip-role-icon" src="${ICONS[ROLES[ci]]}" onerror="this.style.display='none'">
      <span class="flip-role-emoji">${ROLE_EMOJI[ROLES[ci]]}</span>
      <span class="flip-role-name">${ROLES[ci]}</span>
    `;
    col.appendChild(lbl);

    const blueScene = document.createElement('div'); blueScene.className = 'flip-card-scene';
    const blueCard  = document.createElement('div'); blueCard.className = 'flip-card';
    blueCard.innerHTML = `<div class="flip-card-front"><span class="flip-card-front-icon">?</span></div><div class="flip-card-back blue-card"><span class="fc-team">BLUE</span><span class="fc-name">${members[ci].name}</span></div>`;
    blueScene.appendChild(blueCard); col.appendChild(blueScene);
    cardEls.push({ el: blueCard });

    const redScene = document.createElement('div'); redScene.className = 'flip-card-scene';
    const redCard  = document.createElement('div'); redCard.className = 'flip-card';
    redCard.innerHTML = `<div class="flip-card-front"><span class="flip-card-front-icon">?</span></div><div class="flip-card-back red-card"><span class="fc-team">RED</span><span class="fc-name">${members[ci+5].name}</span></div>`;
    redScene.appendChild(redCard); col.appendChild(redScene);
    cardEls.push({ el: redCard });

    grid.appendChild(col);
  }

  const order = shuffle(cardEls.map((_,i)=>i));
  let flipped = 0;
  const progFill = document.getElementById(progId);
  const progTxt  = document.getElementById(progTxtId);

  order.forEach((cardIdx, seq) => {
    setTimeout(() => {
      cardEls[cardIdx].el.classList.add('flipped');
      flipped++;
      const pct = Math.round((flipped/CARD_COUNT)*100);
      progFill.style.width = pct+'%';
      progTxt.textContent = `${flipped} / ${CARD_COUNT}`;
    }, INTERVAL * seq + 200);
  });

  setTimeout(onDone, TOTAL_MS);
}

function makeCard(teamName, cls, members, showScore) {
  const avg = showScore ? (members.reduce((s,m)=>s+(m.score||0),0)/members.length).toFixed(1) : null;
  const c = document.createElement('div');
  c.className = 'team-card ' + cls;
  c.innerHTML = `
    <div class="team-head">
      <div class="team-head-left"><span class="tdot"></span>${teamName}</div>
      ${avg ? `<span class="team-avg">평균 능력치 ${avg}</span>` : ''}
    </div>
    <div class="role-list">
      ${members.map((m,i)=>`
        ${i>0?'<div class="div"></div>':''}
        <div class="role-row" style="animation-delay:${i*0.07}s">
          <div class="role-tag">
            <img class="ri" src="${ICONS[m.role]}" alt="" onerror="this.style.display='none'">
            <span class="role-emoji-sm">${ROLE_EMOJI[m.role]}</span>
            <span class="rn">${m.role}</span>
          </div>
          <span class="pname">${m.name}</span>
          ${showScore && m.score ? `
            <div class="score-bar-wrap"><div class="score-bar" style="width:${m.score*10}%"></div></div>
            <span class="pscore">${m.score}</span>
          ` : ''}
        </div>
      `).join('')}
    </div>
  `;
  return c;
}

function showResult(wrapEl, t1, t2, rerollFn, showScore) {
  wrapEl.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'teams-row';
  row.appendChild(makeCard('블루팀','blue',t1,showScore));
  row.appendChild(makeCard('레드팀','red',t2,showScore));
  wrapEl.appendChild(row);
  const btn = document.createElement('button');
  btn.className = 'btn-reroll';
  btn.textContent = '↺  다시 배정하기';
  btn.onclick = rerollFn;
  wrapEl.appendChild(btn);
  wrapEl.style.display = 'block';
  wrapEl.style.animation = 'none';
  wrapEl.offsetHeight;
  wrapEl.style.animation = 'fadeUp 0.45s ease';
  wrapEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function startAnim(flipId, progId, progTxtId, btnId, members, resEl, rerollFn, showScore) {
  const flipEl = document.getElementById(flipId);
  const btn    = document.getElementById(btnId);
  resEl.style.display = 'none';
  flipEl.classList.add('active');
  btn.disabled = true;
  flipEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
  const t1 = members.slice(0,5);
  const t2 = members.slice(5);
  runFlipAnimation(flipId.replace('flip','flipGrid'), progId, progTxtId, members, () => {
    flipEl.classList.remove('active');
    btn.disabled = false;
    showResult(resEl, t1, t2, rerollFn, showScore);
  });
}

function doRandom() {
  const inputs = [...document.querySelectorAll('#randGrid input')];
  const names  = inputs.map(i => i.value.trim());
  const err    = document.getElementById('errRand');
  if (names.some(n => !n)) { err.textContent = '10명의 이름을 모두 입력해 주세요!'; return; }
  err.textContent = '';
  const players = shuffle(names);
  const r1 = shuffle([...ROLES]), r2 = shuffle([...ROLES]);
  const t1 = players.slice(0,5).map((n,i)=>({role:r1[i],name:n})).sort((a,b)=>ROLES.indexOf(a.role)-ROLES.indexOf(b.role));
  const t2 = players.slice(5).map((n,i) =>({role:r2[i],name:n})).sort((a,b)=>ROLES.indexOf(a.role)-ROLES.indexOf(b.role));
  startAnim('flipRand','progRand','progTxtRand','btnRand',[...t1,...t2],document.getElementById('resRand'),doRandom,false);
}

function doPos() {
  const err  = document.getElementById('errPos');
  const data = {};
  ROLES.forEach(role => {
    const ins = [...document.querySelectorAll(`[data-role="${role}"]`)];
    data[role] = ins.map(i => i.value.trim());
  });
  if (ROLES.some(r => data[r].some(n=>!n))) { err.textContent = '모든 포지션의 이름을 입력해 주세요! (총 10칸)'; return; }
  err.textContent = '';
  const t1=[], t2=[];
  ROLES.forEach(role => {
    const [a,b] = Math.random()<0.5 ? data[role] : [data[role][1],data[role][0]];
    t1.push({role,name:a}); t2.push({role,name:b});
  });
  startAnim('flipPos','progPos','progTxtPos','btnPos',[...t1,...t2],document.getElementById('resPos'),doPos,false);
}

function doAbility() {
  const nameInputs  = [...document.querySelectorAll('#abilityGrid .ab-name')];
  const scoreInputs = [...document.querySelectorAll('#abilityGrid .ab-score')];
  const err = document.getElementById('errAbility');
  const players = nameInputs.map((inp,i) => ({
    name: inp.value.trim(),
    score: parseInt(scoreInputs[i].value, 10),
  }));
  if (players.some(p => !p.name)) { err.textContent = '10명의 이름을 모두 입력해 주세요!'; return; }
  if (players.some(p => isNaN(p.score)||p.score<1||p.score>10)) { err.textContent = '능력치는 1~10 사이의 숫자로 입력해 주세요!'; return; }
  err.textContent = '';
  const { g1, g2 } = balancedSplit(players);
  const r1 = shuffle([...ROLES]), r2 = shuffle([...ROLES]);
  const t1 = g1.map((pi,i)=>({role:r1[i],name:players[pi].name,score:players[pi].score})).sort((a,b)=>ROLES.indexOf(a.role)-ROLES.indexOf(b.role));
  const t2 = g2.map((pi,i)=>({role:r2[i],name:players[pi].name,score:players[pi].score})).sort((a,b)=>ROLES.indexOf(a.role)-ROLES.indexOf(b.role));
  startAnim('flipAbility','progAbility','progTxtAbility','btnAbility',[...t1,...t2],document.getElementById('resAbility'),doAbility,true);
}
</script>
